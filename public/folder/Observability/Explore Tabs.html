<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>kapptivate · Explore Tabs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.2.6/400.css" media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.2.6/500.css" media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.2.6/600.css" media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.2.6/700.css" media="print" onload="this.media='all'">
<style>
:root{
  --sidebar:#1c4a47; --sidebar-hover:rgba(255,255,255,0.06); --sidebar-active:#285c59;
  --sidebar-text:#ffffff; --sidebar-label:rgba(255,255,255,0.6); --sidebar-white:#ffffff; --sidebar-line:rgba(255,255,255,0.12);
  --accent:#ed7846; --accent-hover:#d9663a;
  --content-bg:#FAFAFB; --border:#e4e4e7;
  --text:#24292f; --text-sec:#667085; --text-faint:#94a09a;
  font-family:'Geist','Geist Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--content-bg);color:var(--text);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;font-family:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── proto frame ── */
.proto-ring{position:fixed;inset:0;pointer-events:none;box-shadow:inset 0 0 0 4px rgba(28,74,71,0.12);z-index:2147483646}
.proto-crumb{position:fixed;top:12px;left:12px;z-index:2147483647;display:flex;align-items:center;gap:8px;padding:5px 10px;font-size:11px;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:#475467;background:rgba(255,255,255,0.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid #ececf0;border-radius:8px;box-shadow:0 2px 8px rgba(16,24,40,0.10);text-decoration:none}
.proto-crumb:hover{background:rgba(255,255,255,0.95)}
.proto-crumb .arrow{display:inline-flex;color:#98a2b3}
.proto-crumb .arrow svg{width:13px;height:13px}
.proto-crumb img{height:13px;width:auto;display:block}
.proto-crumb .sep{color:#c0c4cc}
.proto-crumb .ptitle{font-weight:600;color:#1a1a1a}

/* ── app shell ── */
.shell{display:flex;height:100vh}

/* ── sidebar ── */
.sidebar{width:223px;background:var(--sidebar);flex-shrink:0;display:flex;flex-direction:column;padding:14px 12px;overflow-y:auto}
.brand{display:flex;align-items:center;justify-content:space-between;padding:4px 8px 4px}
.brand .logo{display:flex;align-items:center;gap:8px;color:var(--sidebar-white);font-weight:700;font-size:16px}
.collapse{color:var(--sidebar-label)}
.nav-sep{height:1px;background:var(--sidebar-line);margin:12px -12px}
.ws{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:8px;margin-bottom:16px}
.ws .avatar{width:32px;height:32px;border-radius:4px;background:#f6ede2;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ws .name{color:var(--sidebar-white);font-weight:500;font-size:14px;line-height:1.2}
.ws .sub{color:var(--sidebar-white);opacity:.7;font-size:9px;line-height:1.2;margin-top:1px}
.nav-label{color:var(--sidebar-label);font-size:9px;font-weight:600;letter-spacing:.45px;text-transform:uppercase;padding:0 8px 8px}
.nav-item{display:flex;align-items:center;gap:12px;color:var(--sidebar-text);font-size:13px;font-weight:500;padding:7px 8px;border-radius:6px;width:100%;text-align:left;margin-bottom:4px;font-family:inherit;transition:background .12s}
.nav-item svg{width:14px;height:14px;flex-shrink:0}
.nav-item:hover{background:var(--sidebar-hover)}
.nav-item.active{background:var(--sidebar-active);color:#fff}
.spacer{flex:1}
.help-btn{width:32px;height:32px;border-radius:100px;border:1px solid rgba(255,255,255,0.1);color:var(--sidebar-text);display:flex;align-items:center;justify-content:center;margin-top:12px;font-size:14px;font-weight:500}

/* segmented */
.prod-seg{display:flex;background:rgba(255,255,255,0.06);border-radius:6px;padding:2px;margin-bottom:8px}
.prod-seg-btn{flex:1;padding:6px 0;border:none;border-radius:5px;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;background:transparent;color:var(--sidebar-label);transition:all .15s}
.prod-seg-btn.active{background:var(--sidebar-active);color:var(--sidebar-white)}
.prod-seg-btn svg{width:12px;height:12px}

/* mode stack */
.mode-stack{display:grid}
.mode-stack>div{grid-area:1/1}
.mode-stack>.hidden{visibility:hidden;pointer-events:none}

/* ── content ── */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.content-head{display:flex;align-items:center;justify-content:space-between;padding:24px 32px 20px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0}
.content-head-left{display:flex;flex-direction:column;gap:4px}
.content-head h1{font-size:18px;font-weight:700;letter-spacing:-.01em}
.content-head p{font-size:13px;color:var(--text-sec);line-height:1.4}
.content-head-right{display:flex;gap:8px;align-items:center}
.btn{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text);transition:all .12s}
.btn:hover{background:#f5f5f7}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent-hover)}

.content-body{flex:1;overflow-y:auto;padding:24px 32px 48px}

/* ── page views ── */
.page-view{display:none}
.page-view.visible{display:block}

/* ── shared wireframe elements ── */
.search-bar{display:flex;gap:8px;margin-bottom:20px}
.search-input{flex:1;height:36px;border:1px solid var(--border);border-radius:6px;padding:0 12px;font-size:13px;font-family:inherit;background:#fff;color:var(--text);outline:none}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:#b0b7c3}
.filter-btn{height:36px;padding:0 12px;border:1px solid var(--border);border-radius:6px;background:#fff;font-size:12px;font-weight:500;font-family:inherit;color:var(--text-sec);display:flex;align-items:center;gap:6px;cursor:pointer}
.filter-btn:hover{background:#f5f5f7}
.filter-btn svg{width:14px;height:14px}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px}
.kpi-label{font-size:11.5px;color:var(--text-sec);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.kpi-label svg{width:13px;height:13px;color:#98a2b3}
.kpi-value{font-size:22px;font-weight:700;letter-spacing:-.01em}
.kpi-trend{font-size:11px;color:#98a2b3;margin-top:4px;display:flex;align-items:center;gap:4px}
.kpi-trend.up{color:#e0372e}
.kpi-trend.down{color:#1fae7e}
.kpi-trend svg{width:12px;height:12px}

.table-wrap{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--text-sec);text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--border);background:#fafafb}
.table td{padding:10px 14px;border-bottom:1px solid #f0f0f3;vertical-align:middle}
.table tr:last-child td{border-bottom:none}
.table tr:hover td{background:#fafafb}

.tag{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;line-height:1.6}
.tag.green{background:#e6f7f0;color:#1fae7e}
.tag.red{background:#fde8e8;color:#e0372e}
.tag.orange{background:#fff3e6;color:#d97706}
.tag.blue{background:#e8f4fd;color:#2563eb}
.tag.gray{background:#f0f0f3;color:#667085}

.mono{font-variant-numeric:tabular-nums;font-family:'Geist Mono',ui-monospace,monospace;font-size:12px}
.text-sec{color:var(--text-sec)}
.text-faint{color:#98a2b3}

/* ── tabs (for sub-nav within pages) ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:8px 16px;font-size:13px;font-weight:500;color:var(--text-sec);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;font-family:inherit}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* ── logs specific ── */
.log-stream{font-family:'Geist Mono',ui-monospace,monospace;font-size:12px;line-height:1.8;background:#1a1a2e;color:#c8d6e5;border-radius:8px;padding:16px;overflow-x:auto;max-height:420px;overflow-y:auto}
.log-line{display:flex;gap:12px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.log-line:hover{background:rgba(255,255,255,0.03)}
.log-ts{color:#636e82;flex-shrink:0;width:180px}
.log-level{flex-shrink:0;width:50px;font-weight:600}
.log-level.info{color:#22d3ee}
.log-level.warn{color:#fbbf24}
.log-level.error{color:#f87171}
.log-level.debug{color:#a78bfa}
.log-svc{color:#60a5fa;flex-shrink:0;width:120px}
.log-msg{color:#e2e8f0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── traces specific ── */
.trace-row{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .12s}
.trace-row:hover{border-color:#d0d5dd;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.trace-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.trace-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.trace-meta{font-size:11.5px;color:var(--text-sec);display:flex;gap:14px}
.trace-waterfall{height:20px;background:#f5f5f7;border-radius:4px;position:relative;overflow:hidden}
.trace-span{position:absolute;height:100%;border-radius:3px;min-width:3px}

/* ── service map ── */
.svc-map-container{display:grid;grid-template-columns:1fr 280px;gap:20px}
.svc-map-canvas{background:#fff;border:1px solid var(--border);border-radius:8px;min-height:450px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.svc-map-sidebar{display:flex;flex-direction:column;gap:12px}
.svc-node{width:72px;height:72px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10px;font-weight:600;position:absolute;border:2px solid;cursor:pointer;transition:transform .15s}
.svc-node:hover{transform:scale(1.08)}
.svc-node svg{width:20px;height:20px}
.svc-edge{position:absolute;pointer-events:none}
.svc-detail-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px}
.svc-detail-card h3{font-size:13px;font-weight:600;margin-bottom:8px}
.svc-detail-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #f0f0f3}
.svc-detail-row:last-child{border-bottom:none}
.svc-detail-row .label{color:var(--text-sec)}

/* ── kubernetes ── */
.k8s-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.k8s-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px}
.k8s-card h3{font-size:12px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.k8s-card h3 svg{width:14px;height:14px;color:var(--accent)}
.k8s-bar{height:8px;background:#f0f0f3;border-radius:4px;margin-bottom:6px;overflow:hidden}
.k8s-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.k8s-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-sec);margin-bottom:12px}
.k8s-status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.k8s-status-dot.ok{background:#1fae7e}
.k8s-status-dot.warn{background:#f2b338}
.k8s-status-dot.err{background:#e0372e}
</style>
</head>
<body>

<div class="proto-ring" aria-hidden></div>
<a class="proto-crumb" href="/">
  <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></span>
  <img src="/kapptidrafts-logo.svg" alt="kapptidrafts">
  <span class="sep">/</span>
  <span class="ptitle">Explore Tabs</span>
</a>

<div class="shell">

<!-- ═══════ SIDEBAR ═══════ -->
<aside class="sidebar" id="sidebar"></aside>

<!-- ═══════ CONTENT ═══════ -->
<div class="content">
  <div class="content-head" id="content-head"></div>
  <div class="content-body">
    <div class="page-view visible" id="view-logs"></div>
    <div class="page-view" id="view-traces"></div>
    <div class="page-view" id="view-svcmap"></div>
    <div class="page-view" id="view-k8s"></div>
  </div>
</div>

</div>

const EDGES = [
  {from:'gw',to:'auth'},{from:'gw',to:'core'},{from:'gw',to:'run'},
  {from:'core',to:'met'},{from:'core',to:'run'},{from:'run',to:'scr'},
]

const mapSvg = (() => {
  const W = 600, H = 400
  let lines = ''
  EDGES.forEach(e => {
    const f = SERVICES.find(s=>s.id===e.from), t = SERVICES.find(s=>s.id===e.to)
    const x1 = f.x/100*W, y1 = f.y/100*H, x2 = t.x/100*W, y2 = t.y/100*H
    lines += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#d0d5dd" stroke-width="1.5" stroke-dasharray="4 3"/>`
  })
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%;position:absolute;inset:0">${lines}</svg>`
})()

/* ═══════ INTERACTIONS ═══════ */

let currentTab = 'logs'

function switchTab(tab, btn) {
  if (!PAGES[tab]) return
  currentTab = tab
  document.querySelectorAll('.page-view').forEach(v => v.classList.remove('visible'))
  const view = document.getElementById(PAGES[tab].view)
  if (view) view.classList.add('visible')
  document.querySelectorAll('#sidebar .nav-item').forEach(i => i.classList.remove('active'))
  btn.classList.add('active')
  renderHead(tab)
}

function switchSeg(prod) {
  document.querySelectorAll('#pseg .prod-seg-btn').forEach((b,i) => {
    b.classList.toggle('active', prod==='run' ? i===0 : i===1)
  })
  const isRun = prod === 'run'
  document.getElementById('mode-run').classList.toggle('hidden', !isRun)
  document.getElementById('mode-explore').classList.toggle('hidden', isRun)
}
