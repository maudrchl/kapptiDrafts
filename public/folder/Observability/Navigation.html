<style>
:root{
  --sidebar:#1c4a47; --sidebar-hover:rgba(255,255,255,0.06); --sidebar-active:#285c59;
  --sidebar-text:#ffffff; --sidebar-label:rgba(255,255,255,0.6); --sidebar-white:#ffffff; --sidebar-line:rgba(255,255,255,0.12);
  --accent:#ed7846; --accent-hover:#d9663a;
  --content-bg:#FAFAFB; --border:#e4e4e7;
  --text:#24292f; --text-muted:#667085; --text-faint:#94a09a;
  font-family:'Geist','Geist Sans','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--content-bg);color:var(--text);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;font-family:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── app shell ── */
.shell{display:flex;height:100vh}

/* ── left picker ── */
.picker{
  width:300px;min-width:300px;background:#fff;border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;
}
.picker-head{padding:24px 24px 0;flex-shrink:0}
.picker-head h1{font-size:17px;font-weight:700;margin-bottom:2px}
.picker-head p{font-size:12px;color:var(--text-muted);line-height:1.5;margin-bottom:20px}
.picker-group{padding:0 12px;margin-bottom:6px}
.picker-group-label{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.45px;
  color:var(--text-faint);padding:12px 12px 6px;
}
.picker-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:8px;cursor:pointer;
  border:none;background:none;width:100%;text-align:left;font-family:inherit;
  transition:background .12s;
}
.picker-item:hover{background:#f5f2ec}
.picker-item.active{background:var(--sidebar);color:#fff}
.picker-item.active .pi-desc{color:rgba(255,255,255,.6)}
.picker-item.active .pi-num{background:rgba(255,255,255,.15);color:#fff}
.pi-num{
  width:24px;height:24px;border-radius:6px;background:#eef1f0;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:var(--text-faint);flex-shrink:0;
}
.pi-text{min-width:0}
.pi-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-desc{font-size:11px;color:var(--text-muted);line-height:1.4;margin-top:1px}

/* ── right display ── */
.display{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;padding:40px}

/* ── SIDEBAR — exact same as Locations proto ── */
.sidebar{width:223px;background:var(--sidebar);flex-shrink:0;display:flex;flex-direction:column;padding:14px 12px;overflow-y:auto;min-height:580px}
.brand{display:flex;align-items:center;justify-content:space-between;padding:4px 8px 4px}
.brand .logo{display:flex;align-items:center;gap:8px;color:var(--sidebar-white);font-weight:700;font-size:16px}
.collapse{color:var(--sidebar-label)}
.nav-sep{height:1px;background:var(--sidebar-line);margin:12px -12px}
.ws{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:8px;margin-bottom:16px}
.ws .avatar{width:32px;height:32px;border-radius:4px;background:#f6ede2;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ws .name{color:var(--sidebar-white);font-weight:500;font-size:14px;line-height:1.2}
.ws .sub{color:var(--sidebar-white);opacity:.7;font-size:9px;line-height:1.2;margin-top:1px}
.nav-label{color:var(--sidebar-label);font-size:9px;font-weight:600;letter-spacing:.45px;text-transform:uppercase;padding:0 8px 8px}
.nav-item{display:flex;align-items:center;gap:12px;color:var(--sidebar-text);font-size:13px;font-weight:500;padding:7px 8px;border-radius:6px;width:100%;text-align:left;margin-bottom:4px;font-family:inherit}
.nav-item svg{width:14px;height:14px;flex-shrink:0}
.nav-item:hover{background:var(--sidebar-hover)}
.nav-item.active{background:var(--sidebar-active);color:#fff}
.nav-item.boxed{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.2);justify-content:space-between;padding:8px 16px;margin-bottom:8px}
.nav-item.boxed .lead{display:flex;align-items:center;gap:8px}
.spacer{flex:1}
.help-btn{width:32px;height:32px;border-radius:100px;border:1px solid rgba(255,255,255,0.1);color:var(--sidebar-text);display:flex;align-items:center;justify-content:center;margin-top:12px;font-size:14px;font-weight:500}

/* ── product switcher (patterns 2a, 3b) ── */
.product-switcher{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:8px;margin-bottom:8px;cursor:pointer}
.product-switcher .prod-icon{width:32px;height:32px;border-radius:4px;background:rgba(237,120,70,.12);display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0}
.product-switcher .prod-icon svg{width:16px;height:16px}
.product-switcher .prod-name{color:var(--sidebar-white);font-weight:500;font-size:14px;line-height:1.2}
.product-switcher .prod-sub{color:var(--sidebar-white);opacity:.7;font-size:9px;line-height:1.2;margin-top:1px}
.product-switcher .chevron{margin-left:auto;color:var(--sidebar-label)}
.product-switcher .chevron svg{width:15px;height:15px}

/* ── segmented (patterns 2b, 3a) ── */
.prod-seg{display:flex;background:rgba(255,255,255,0.06);border-radius:6px;padding:2px;margin-bottom:8px}
.prod-seg-btn{flex:1;padding:6px 0;border:none;border-radius:5px;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;background:transparent;color:var(--sidebar-label);transition:all .15s}
.prod-seg-btn.active{background:var(--sidebar-active);color:var(--sidebar-white)}
.prod-seg-btn svg{width:12px;height:12px}

/* panels */
.sb-panel{display:none}
.sb-panel.visible{display:flex}
</style>
</head>
<body>

<div class="shell">

<!-- ═══════ LEFT: PATTERN PICKER ═══════ -->
<div class="picker">
  <div class="picker-head">
    <h1>Observability Nav</h1>
    <p>6 patterns de navigation pour intégrer l'observabilité dans la sidebar. Clique pour comparer.</p>
  </div>

  <div class="picker-group">
    <div class="picker-group-label">1 · Nav + Observability</div>
    <button class="picker-item active" onclick="show('1a',this)">
      <span class="pi-num">1a</span>
      <div class="pi-text"><div class="pi-title">Section dédiée</div><div class="pi-desc">Bloc OBSERVABILITY à plat, après Overview</div></div>
    </button>
    <button class="picker-item" onclick="show('1b',this)">
      <span class="pi-num">1b</span>
      <div class="pi-text"><div class="pi-title">Entrée dépliable</div><div class="pi-desc">Observability en produit sous By product</div></div>
    </button>
  </div>

  <div class="picker-group">
    <div class="picker-group-label">2 · Produit à part entière (switcher)</div>
    <button class="picker-item" onclick="show('2a',this)">
      <span class="pi-num">2a</span>
      <div class="pi-text"><div class="pi-title">Menu déroulant</div><div class="pi-desc">Dropdown product switcher</div></div>
    </button>
    <button class="picker-item" onclick="show('2b',this)">
      <span class="pi-num">2b</span>
      <div class="pi-text"><div class="pi-title">Segmented</div><div class="pi-desc">Rocket App | Observability côte à côte</div></div>
    </button>
  </div>

  <div class="picker-group">
    <div class="picker-group-label">3 · Nommage Run ↔ Observability</div>
    <button class="picker-item" onclick="show('3a',this)">
      <span class="pi-num">3a</span>
      <div class="pi-text"><div class="pi-title">Segmented Run / Obs</div><div class="pi-desc">Tabs Run | Observability</div></div>
    </button>
    <button class="picker-item" onclick="show('3b',this)">
      <span class="pi-num">3b</span>
      <div class="pi-text"><div class="pi-title">Menu déroulant Run</div><div class="pi-desc">Dropdown switcher avec « Run » actif</div></div>
    </button>
  </div>
</div>

<!-- ═══════ RIGHT: SIDEBAR DISPLAY ═══════ -->
<div class="display">
  <div class="sb-panel visible" id="panel-1a"><aside class="sidebar" id="sb-1a"></aside></div>
  <div class="sb-panel" id="panel-1b"><aside class="sidebar" id="sb-1b"></aside></div>
  <div class="sb-panel" id="panel-2a"><aside class="sidebar" id="sb-2a"></aside></div>
  <div class="sb-panel" id="panel-2b"><aside class="sidebar" id="sb-2b"></aside></div>
  <div class="sb-panel" id="panel-3a"><aside class="sidebar" id="sb-3a"></aside></div>
  <div class="sb-panel" id="panel-3b"><aside class="sidebar" id="sb-3b"></aside></div>
</div>
</div>

  wrench: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`,

  check:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-4"/></svg>`,
  target: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4 12H2m20 0h-2"/><circle cx="12" cy="12" r="5"/></svg>`,
  sync:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m16 18 2 2 4-4"/><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74"/></svg>`,
  phone:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>`,
  globe:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg>`,
  pin:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-6.5-7-11a7 7 0 0 1 14 0c0 4.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>`,
  chev:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>`,
}

const ni = (icon, label, active) => `<button class="nav-item${active?' active':''}">${icon}${label}</button>`
const boxed = (icon, label) => `<button class="nav-item boxed"><span class="lead">${icon}${label}</span>${CHEV_R}</button>`

const brand = `<div class="brand"><div class="logo">${LOGO}</div><span class="collapse">${COLLAPSE}</span></div>`
const sep = `<div class="nav-sep"></div>`
const ws = `<div class="ws"><div class="avatar">🐙</div><div><div class="name">kapptivate</div><div class="sub">Workspace</div></div></div>`

const overviewSection = `
  <div class="nav-label">Overview</div>
  ${ni(I.screen,'Realtime status',true)}
  ${ni(I.bell,'Incidents')}
  ${ni(I.chart,'Analytics')}`

const rocketProductItems = `
  ${ni(I.live,'Live session')}
  ${ni(I.zap,'Tests')}
  ${ni(I.check,'Executions')}
  ${ni(I.target,'Monitors')}`

const obsItems = `
  ${ni(I.file,'Logs explorer')}
  ${ni(I.book,'Traces')}
  ${ni(I.net,'Service map')}
  ${ni(I.wrench,'Kubernetes')}`

const equipSection = `
  <div class="nav-label">Equipments</div>
  ${ni(I.pin,'Locations')}
  ${ni(I.globe,'Browser presets')}
  ${ni(I.phone,'Devices lab')}`

const footer = `<div class="spacer"></div>${sep}<button class="help-btn">?</button>`

/* ═══════ BUILD SIDEBARS ═══════ */

// 1a: Section dédiée OBSERVABILITY
document.getElementById('sb-1a').innerHTML = `
  ${brand}${sep}${ws}
  ${overviewSection}
  ${sep}
  <div class="nav-label">Observability</div>
  ${obsItems}
  ${sep}
  <div class="nav-label">By product</div>
  ${boxed(I.grid,'Julio')}
  ${rocketProductItems}
  ${sep}
  ${equipSection}
  ${footer}`

// 1b: Entrée dépliable (Observability comme produit sous By product)
document.getElementById('sb-1b').innerHTML = `
  ${brand}${sep}${ws}
  ${overviewSection}
  ${sep}
  <div class="nav-label">By product</div>
  ${boxed(I.grid,'Julio')}
  ${rocketProductItems}
  ${boxed(I.eye,'Observability')}
  ${obsItems}
  ${sep}
  ${equipSection}
  ${footer}`

// 2a: Dropdown product switcher
document.getElementById('sb-2a').innerHTML = `
  ${brand}${sep}
  <div class="product-switcher" onclick="switchDropdown('2a')">
    <div class="prod-icon" id="p2a-icon">${I.grid}</div>
    <div><div class="prod-name" id="p2a-name">Julio</div><div class="prod-sub">Produit actif</div></div>
    <div class="chevron">${I.chev}</div>
  </div>
  ${ws}
  ${overviewSection}
  ${sep}
  <div id="p2a-section">
    <div class="nav-label">Julio</div>
    ${rocketProductItems}
  </div>
  ${sep}
  ${equipSection}
  ${footer}`

// 2b: Segmented product
document.getElementById('sb-2b').innerHTML = `
  ${brand}${sep}
  <div class="prod-seg" id="pseg-2b">
    <button class="prod-seg-btn active" onclick="switchSeg('2b','app')">${I.grid} Julio</button>
    <button class="prod-seg-btn" onclick="switchSeg('2b','obs')">${I.eye} Observability</button>
  </div>
  ${ws}
  ${overviewSection}
  ${sep}
  <div id="p2b-section">
    <div class="nav-label">Julio</div>
    ${rocketProductItems}
  </div>
  ${sep}
  ${equipSection}
  ${footer}`

// 3a: Segmented Run/Observability
document.getElementById('sb-3a').innerHTML = `
  ${brand}${sep}
  <div class="prod-seg" id="pseg-3a">
    <button class="prod-seg-btn active" onclick="switchSeg('3a','run')">${I.zap} Run</button>
    <button class="prod-seg-btn" onclick="switchSeg('3a','obs')">${I.eye} Observability</button>
  </div>
  ${ws}
  ${overviewSection}
  ${sep}
  <div id="p3a-section">
    <div class="nav-label">Run</div>
    ${rocketProductItems}
  </div>
  ${sep}
  ${equipSection}
  ${footer}`

// 3b: Dropdown Run
document.getElementById('sb-3b').innerHTML = `
  ${brand}${sep}
  <div class="product-switcher" onclick="switchDropdown('3b')">
    <div class="prod-icon" id="p3b-icon">${I.zap}</div>
    <div><div class="prod-name" id="p3b-name">Run</div><div class="prod-sub">Produit actif</div></div>
    <div class="chevron">${I.chev}</div>
  </div>
  ${ws}
  ${overviewSection}
  ${sep}
  <div id="p3b-section">
    <div class="nav-label">Run</div>
    ${rocketProductItems}
  </div>
  ${sep}
  ${equipSection}
  ${footer}`

/* ═══════ INTERACTIONS ═══════ */

function show(id, btn) {
  document.querySelectorAll('.sb-panel').forEach(p => p.classList.remove('visible'))
  document.getElementById('panel-'+id).classList.add('visible')
  document.querySelectorAll('.picker-item').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
}

// Dropdown product switcher (2a, 3b)
const dropdownState = { '2a': 'app', '3b': 'run' }
function switchDropdown(id) {
  if (id === '2a') {
    dropdownState['2a'] = dropdownState['2a'] === 'app' ? 'obs' : 'app'
    const isApp = dropdownState['2a'] === 'app'
    document.getElementById('p2a-name').textContent = isApp ? 'Julio' : 'Observability'
    document.getElementById('p2a-icon').innerHTML = isApp ? I.grid : I.eye
    document.getElementById('p2a-section').innerHTML = isApp
      ? `<div class="nav-label">Julio</div>${rocketProductItems}`
      : `<div class="nav-label">Observability</div>${obsItems}`
  } else {
    dropdownState['3b'] = dropdownState['3b'] === 'run' ? 'obs' : 'run'
    const isRun = dropdownState['3b'] === 'run'
    document.getElementById('p3b-name').textContent = isRun ? 'Run' : 'Observability'
    document.getElementById('p3b-icon').innerHTML = isRun ? I.zap : I.eye
    document.getElementById('p3b-section').innerHTML = isRun
      ? `<div class="nav-label">Run</div>${rocketProductItems}`
      : `<div class="nav-label">Observability</div>${obsItems}`
  }
}

// Segmented product switcher (2b, 3a)
function switchSeg(id, prod) {
  document.querySelectorAll(`#pseg-${id} .prod-seg-btn`).forEach((b,i) => {
    const first = (id==='2b' && prod==='app') || (id==='3a' && prod==='run')
    b.classList.toggle('active', first ? i===0 : i===1)
  })
  if (id === '2b') {
    document.getElementById('p2b-section').innerHTML = prod === 'app'
      ? `<div class="nav-label">Julio</div>${rocketProductItems}`
      : `<div class="nav-label">Observability</div>${obsItems}`
  } else {
    document.getElementById('p3a-section').innerHTML = prod === 'run'
      ? `<div class="nav-label">Run</div>${rocketProductItems}`
      : `<div class="nav-label">Observability</div>${obsItems}`
  }
}

// Nav item click → active (scoped to sidebar)
document.querySelectorAll('.sidebar').forEach(sb => {
  sb.addEventListener('click', e => {
    const item = e.target.closest('.nav-item:not(.boxed)')
    if (!item) return
    sb.querySelectorAll('.nav-item:not(.boxed)').forEach(i => i.classList.remove('active'))
    item.classList.add('active')
  })
})
</script>

</html>
