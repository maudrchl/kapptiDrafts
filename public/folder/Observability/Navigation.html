<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>kapptivate · Observability Nav</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#f0ece4;color:#24292f;height:100vh;overflow:hidden}

/* ── app shell ── */
.shell{display:flex;height:100vh}

/* ── left picker ── */
.picker{
  width:320px;min-width:320px;background:#fff;border-right:1px solid #e0dcd4;
  display:flex;flex-direction:column;overflow-y:auto;
}
.picker-head{padding:24px 24px 0;flex-shrink:0}
.picker-head h1{font-size:17px;font-weight:700;margin-bottom:2px}
.picker-head p{font-size:12px;color:#667085;line-height:1.5;margin-bottom:20px}
.picker-group{padding:0 12px;margin-bottom:6px}
.picker-group-label{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:#999;padding:12px 12px 6px;
}
.picker-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:8px;cursor:pointer;
  border:none;background:none;width:100%;text-align:left;font-family:inherit;
  transition:background .12s;
}
.picker-item:hover{background:#f5f2ec}
.picker-item.active{background:#1c4a47;color:#fff}
.picker-item.active .pi-desc{color:rgba(255,255,255,.6)}
.picker-item.active .pi-num{background:rgba(255,255,255,.15);color:#fff}
.pi-num{
  width:24px;height:24px;border-radius:6px;background:#e8e4dc;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#667085;flex-shrink:0;
}
.pi-text{min-width:0}
.pi-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-desc{font-size:11px;color:#667085;line-height:1.4;margin-top:1px}

/* ── right display ── */
.display{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;padding:40px}

/* ── shared sidebar tokens ── */
:root{
  --sb-bg:#1c4a47;
  --sb-bg-hover:rgba(255,255,255,.07);
  --sb-bg-active:rgba(255,255,255,.12);
  --sb-white:#fff;
  --sb-cream:#FFF9D4;
  --sb-muted:rgba(255,255,255,.55);
  --sb-label:rgba(255,255,255,.4);
  --sb-sep:rgba(255,255,255,.1);
  --sb-accent:#ed7846;
  --sb-accent-bg:rgba(237,120,70,.15);
  --sb-radius:6px;
  --sb-w:280px;
}
.sidebar{
  width:var(--sb-w);min-height:580px;
  background:var(--sb-bg);border-radius:12px;
  display:flex;flex-direction:column;
  padding:12px;color:var(--sb-white);
  font-size:14px;overflow:hidden;user-select:none;
  box-shadow:0 8px 32px rgba(0,0,0,.12);
}
.brand{display:flex;align-items:center;justify-content:space-between;padding:4px 8px 4px}
.brand .logo img{height:20px;width:auto}
.brand .collapse-btn{color:var(--sb-label);cursor:pointer;display:flex}
.ws{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--sb-radius);margin:4px 0}
.ws .avatar{width:36px;height:36px;border-radius:8px;background:var(--sb-accent-bg);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--sb-accent);font-weight:700;flex-shrink:0}
.ws .name{font-weight:600;font-size:13px}
.ws .sub{font-size:11px;color:var(--sb-muted)}
.nav-label{
  font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
  color:var(--sb-label);padding:10px 8px 4px;
  display:flex;align-items:center;justify-content:space-between;cursor:pointer;
}
.nav-label svg{width:14px;height:14px;transition:transform .2s}
.nav-label.collapsed svg{transform:rotate(-90deg)}
.nav-items{overflow:hidden;transition:max-height .25s ease}
.nav-items.collapsed{max-height:0!important}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:7px 8px;border-radius:var(--sb-radius);
  color:var(--sb-white);cursor:pointer;
  font-size:13px;font-weight:500;
  border:none;background:none;width:100%;text-align:left;
  font-family:inherit;transition:background .12s;
}
.nav-item:hover{background:var(--sb-bg-hover)}
.nav-item.active{background:var(--sb-bg-active)}
.nav-item svg{width:18px;height:18px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.spacer{flex:1}
.help-btn{width:32px;height:32px;border-radius:50%;background:var(--sb-bg-hover);border:1px solid var(--sb-sep);color:var(--sb-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:auto}
.help-btn svg{width:16px;height:16px}

/* segmented */
.segmented{display:flex;background:rgba(255,255,255,.08);border-radius:8px;padding:3px;margin:4px 0 2px}
.seg-btn{flex:1;padding:6px 0;border:none;border-radius:6px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;background:transparent;color:var(--sb-muted);transition:all .15s}
.seg-btn.active{background:rgba(255,255,255,.15);color:var(--sb-white)}
.seg-btn svg{width:15px;height:15px}

/* product switcher dropdown */
.product-switcher{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--sb-radius);background:var(--sb-bg-active);cursor:pointer;margin:4px 0}
.product-switcher .prod-icon{width:32px;height:32px;border-radius:8px;background:var(--sb-accent-bg);display:flex;align-items:center;justify-content:center;color:var(--sb-accent)}
.product-switcher .prod-name{font-weight:600;font-size:13px}
.product-switcher .prod-sub{font-size:11px;color:var(--sb-muted)}
.product-switcher .chevron{margin-left:auto;color:var(--sb-muted)}
.product-switcher .chevron svg{width:16px;height:16px}

/* product entry (collapsible under BY PRODUCT) */
.prod-entry{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:var(--sb-radius);cursor:pointer;font-size:13px;font-weight:600;color:var(--sb-white);background:var(--sb-bg-active);margin:2px 0}
.prod-entry svg{width:18px;height:18px;opacity:.7}
.prod-entry .chevron{margin-left:auto;transition:transform .2s}
.prod-entry .chevron svg{width:14px;height:14px}
.prod-entry.collapsed .chevron{transform:rotate(-90deg)}
.prod-sub-items{padding-left:12px;overflow:hidden;transition:max-height .25s ease}
.prod-sub-items.collapsed{max-height:0!important}

/* product segmented */
.prod-seg{display:flex;background:rgba(255,255,255,.08);border-radius:8px;padding:3px;margin:4px 0 2px}
.prod-seg-btn{flex:1;padding:6px 0;border:none;border-radius:6px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;background:transparent;color:var(--sb-muted);transition:all .15s}
.prod-seg-btn.active{background:rgba(255,255,255,.15);color:var(--sb-white)}
.prod-seg-btn svg{width:14px;height:14px}

/* panels hidden by default */
.panel{display:none}
.panel.visible{display:block}
</style>
</head>
<body>

<div class="shell">

<!-- ═══════ LEFT: PATTERN PICKER ═══════ -->
<div class="picker">
  <div class="picker-head">
    <h1>Observability Nav</h1>
    <p>6 patterns de navigation sidebar pour intégrer l'observabilité. Clique pour comparer.</p>
  </div>

  <div class="picker-group">
    <div class="picker-group-label">1 · Nav + Observability</div>

      <span class="pi-num">1b</span>

</div>

<!-- ═══════ RIGHT: SIDEBAR DISPLAY ═══════ -->
<div class="display">

<div class="panel visible" id="panel-1a">
  <div class="sidebar" id="sb-1a"></div>
</div>

<!-- ─── 1b: Entrée dépliable ─── -->
<div class="panel" id="panel-1b">
  <div class="sidebar" id="sb-1b"></div>
</div>

<!-- ─── 2a: Dropdown product switcher ─── -->
<div class="panel" id="panel-2a">
  <div class="sidebar" id="sb-2a"></div>
</div>

<!-- ─── 2b: Segmented product ─── -->
<div class="panel" id="panel-2b">
  <div class="sidebar" id="sb-2b"></div>
</div>

<!-- ─── 3a: Segmented Run/Observability ─── -->
<div class="panel" id="panel-3a">
  <div class="sidebar" id="sb-3a"></div>
</div>

<!-- ─── 3b: Dropdown Run ─── -->
<div class="panel" id="panel-3b">
  <div class="sidebar" id="sb-3b"></div>
</div>

</div><!-- /display -->
</div><!-- /shell -->

/* ── reusable HTML fragments ── */
const brandBar = `<div class="brand"><div class="logo">${LOGO}</div><span class="collapse-btn">${COLLAPSE}</span></div>`
const wsBlock = `<div class="ws"><div class="avatar">+</div><div><div class="name">Rocket Corp</div><div class="sub">Workspace</div></div></div>`
const runExploreSeg = `<div class="segmented"><button class="seg-btn active" onclick="segSwitch(this)">${I.zap}Run</button><button class="seg-btn" onclick="segSwitch(this)">${I.chart}Explore</button></div>`

function sectionLabel(title) { return `<div class="nav-label" onclick="toggleSection(this)">${title} ${I.chev}</div>` }
function navItem(icon, label, active) { return `<button class="nav-item${active?' active':''}">${icon}${label}</button>` }

const generalItems = `
  ${sectionLabel('General')}
  <div class="nav-items">
    ${navItem(I.screen,'Realtime status',true)}
    ${navItem(I.bell,'Incidents')}
    ${navItem(I.chart,'Analytics')}
  </div>`

const rocketItems = `
  ${navItem(I.live,'Live session')}
  ${navItem(I.zap,'Tests')}
  ${navItem(I.check,'Executions')}
  ${navItem(I.target,'Monitors')}
  ${navItem(I.sync,'Configurations')}`

const obsNavItems = `
  ${navItem(I.file,'Logs explorer')}
  ${navItem(I.book,'Traces')}
  ${navItem(I.net,'Service map')}
  ${navItem(I.wrench,'Kubernetes')}`

const equipItems = `
  ${sectionLabel('Equipments')}
  <div class="nav-items">
    ${navItem(I.phone,'Devices lab')}
    ${navItem(I.globe,'Browser presets')}
    ${navItem(I.pin,'Locations')}
  </div>`

const helpBtn = `<div class="spacer"></div><div class="help-btn">${I.help}</div>`

/* ═══════ BUILD SIDEBARS ═══════ */

/* 1a: Section dédiée OBSERVABILITY */

  ${brandBar}${wsBlock}${runExploreSeg}
  ${generalItems}
  ${sectionLabel('Observability')}
  <div class="nav-items">${obsNavItems}</div>
  ${sectionLabel('By product')}
  <div class="nav-items">
    <div class="prod-entry" onclick="toggleProd(this)">${I.grid}Rocket App <span class="chevron">${I.chev}</span></div>
    <div class="prod-sub-items">${rocketItems}</div>
  </div>
  ${equipItems}${helpBtn}`

/* 1b: Entrée dépliable */
document.getElementById('sb-1b').innerHTML = `
  ${brandBar}${wsBlock}${runExploreSeg}
  ${generalItems}
  ${sectionLabel('By product')}
  <div class="nav-items">
    <div class="prod-entry" onclick="toggleProd(this)">${I.grid}Rocket App <span class="chevron">${I.chev}</span></div>
    <div class="prod-sub-items">${rocketItems}</div>
    <div class="prod-entry" onclick="toggleProd(this)">${I.eye}Observability <span class="chevron">${I.chev}</span></div>
    <div class="prod-sub-items">${obsNavItems}</div>
  </div>
  ${equipItems}${helpBtn}`

/* 2a: Dropdown product switcher */
document.getElementById('sb-2a').innerHTML = `
  ${brandBar}${wsBlock}
  <div class="product-switcher" onclick="switchProduct('2a')">
    <div class="prod-icon" id="p2a-icon">${I.grid}</div>
    <div><div class="prod-name" id="p2a-name">Rocket App</div><div class="prod-sub">Produit actif</div></div>
    <div class="chevron">${I.chev}</div>
  </div>
  ${runExploreSeg}
  ${generalItems}
  <div id="p2a-section">
    ${sectionLabel('Rocket App')}
    <div class="nav-items">${rocketItems}</div>
  </div>
  ${equipItems}${helpBtn}`

/* 2b: Segmented product */
document.getElementById('sb-2b').innerHTML = `
  ${brandBar}${wsBlock}
  <div class="prod-seg" id="pseg-2b">
    <button class="prod-seg-btn active" onclick="switchProdSeg('2b','app')">${I.grid}Rocket App</button>
    <button class="prod-seg-btn" onclick="switchProdSeg('2b','obs')">${I.eye}Observability</button>

  ${equipItems}${helpBtn}`

document.getElementById('sb-3a').innerHTML = `
  ${brandBar}${wsBlock}
  <div class="prod-seg" id="pseg-3a">
    <button class="prod-seg-btn active" onclick="switchProdSeg('3a','run')">${I.zap}Run</button>

    <div class="prod-icon" id="p3b-icon">${I.zap}</div>
    <div><div class="prod-name" id="p3b-name">Run</div><div class="prod-sub">Produit actif</div></div>
    <div class="chevron">${I.chev}</div>
  </div>
  ${runExploreSeg}
  ${generalItems}
  <div id="p3b-section">
    ${sectionLabel('Run')}
    <div class="nav-items">${rocketItems}</div>
  </div>
  ${equipItems}${helpBtn}`

/* ═══════ INTERACTIONS ═══════ */

/* Panel switcher */
function show(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('visible'))
  document.getElementById('panel-'+id).classList.add('visible')
  document.querySelectorAll('.picker-item').forEach(b => b.classList.remove('active'))
  event.currentTarget.classList.add('active')
}

/* Collapsible sections */
function toggleSection(label) {
  label.classList.toggle('collapsed')
  const items = label.nextElementSibling
  if (!items) return
  if (items.classList.contains('collapsed')) {
    items.style.maxHeight = items.scrollHeight + 'px'
    items.classList.remove('collapsed')
  } else {
    items.style.maxHeight = items.scrollHeight + 'px'
    requestAnimationFrame(() => items.classList.add('collapsed'))
  }
}

/* Prod entry toggle */
function toggleProd(entry) {
  entry.classList.toggle('collapsed')
  const sub = entry.nextElementSibling
  if (!sub) return
  if (sub.classList.contains('collapsed')) {
    sub.style.maxHeight = sub.scrollHeight + 'px'
    sub.classList.remove('collapsed')
  } else {
    sub.style.maxHeight = sub.scrollHeight + 'px'
    requestAnimationFrame(() => sub.classList.add('collapsed'))
  }
}

/* Segmented toggle */
function segSwitch(btn) {
  btn.parentElement.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
}

/* Obs section HTML for product switching */
const obsSectionHtml = `${sectionLabel('Observability')}<div class="nav-items" style="max-height:999px">${obsNavItems}</div>`
const appSectionHtml = `${sectionLabel('Rocket App')}<div class="nav-items" style="max-height:999px">${rocketItems}</div>`
const runSectionHtml = `${sectionLabel('Run')}<div class="nav-items" style="max-height:999px">${rocketItems}</div>`

/* 2a dropdown */
const p2aState = { prod: 'app' }
function switchProduct(prefix) {
  if (prefix === '2a') {
    p2aState.prod = p2aState.prod === 'app' ? 'obs' : 'app'
    document.getElementById('p2a-name').textContent = p2aState.prod === 'app' ? 'Rocket App' : 'Observability'
    document.getElementById('p2a-icon').innerHTML = p2aState.prod === 'app' ? I.grid : I.eye
    document.getElementById('p2a-section').innerHTML = p2aState.prod === 'app' ? appSectionHtml : obsSectionHtml
  } else if (prefix === '3b') {
    p3bState.prod = p3bState.prod === 'run' ? 'obs' : 'run'
    document.getElementById('p3b-name').textContent = p3bState.prod === 'run' ? 'Run' : 'Observability'
    document.getElementById('p3b-icon').innerHTML = p3bState.prod === 'run' ? I.zap : I.eye
    document.getElementById('p3b-section').innerHTML = p3bState.prod === 'run' ? runSectionHtml : obsSectionHtml
  }
}

/* 2b / 3a segmented product */
function switchProdSeg(prefix, prod) {
  document.querySelectorAll(`#pseg-${prefix} .prod-seg-btn`).forEach((b,i) => {
    const isApp = (prefix==='2b' && prod==='app' && i===0) || (prefix==='2b' && prod==='obs' && i===1)
    const isRun = (prefix==='3a' && prod==='run' && i===0) || (prefix==='3a' && prod==='obs' && i===1)
    b.classList.toggle('active', isApp || isRun)
  })
  if (prefix === '2b') {
    document.getElementById('p2b-section').innerHTML = prod === 'app' ? appSectionHtml : obsSectionHtml
  } else if (prefix === '3a') {
    document.getElementById('p3a-section').innerHTML = prod === 'run' ? runSectionHtml : obsSectionHtml
  }
}

const p3bState = { prod: 'run' }

/* Init max-heights */
document.querySelectorAll('.nav-items').forEach(el => el.style.maxHeight = el.scrollHeight + 'px')
document.querySelectorAll('.prod-sub-items').forEach(el => el.style.maxHeight = el.scrollHeight + 'px')

/* Nav item click → active */
document.querySelectorAll('.sidebar').forEach(sb => {
  sb.addEventListener('click', e => {
    const item = e.target.closest('.nav-item')
    if (!item) return
    sb.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'))
    item.classList.add('active')
  })
})
</script>
