<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>kapptivate · Locations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.2.6/400.css" media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.2.6/500.css" media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.2.6/600.css" media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.2.6/700.css" media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5.2.6/400.css" media="print" onload="this.media='all'">
<style>
:root{
  --accent:#ed7846;
  --accent-hover:#d9663a;
  --content-bg:#FAFAFB;
  --card:#ffffff;
  --border:#e6e9e8;
  --border-strong:#d5dad8;
  --text:#1b2a24;
  --text-muted:#69766f;
  --text-faint:#94a09a;
  --ok-bg:#e9f7f2;--ok-tx:#12b76a;
  --blue-bg:#e8f0fe;--blue-tx:#2563eb;
  --amber-bg:#fdf1e2;--amber-tx:#b26a1a;
  --green-bg:#eaf5ee;--green-tx:#1f7a4d;
  --radius:10px;
  --mono:'Geist Mono','JetBrains Mono',ui-monospace,monospace;
  font-family:'Geist','Geist Sans','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--content-bg);color:var(--text);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;font-family:inherit}
.app{display:flex;height:100vh}
button,input,select,textarea{font-family:inherit;cursor:pointer;border:none;background:none}
input{cursor:text}

/* ---------- MAIN ---------- */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 22px;background:#fff;flex-shrink:0;font-size:13.5px}
.crumb{color:var(--text-muted);display:flex;align-items:center;gap:6px}
.crumb button{color:var(--text-muted);font-size:13.5px;display:flex;align-items:center;gap:5px}
.crumb button:hover{color:var(--text)}
.crumb .sep{color:var(--text-faint)}
.crumb .cur{color:var(--text);font-weight:600}
.content{flex:1;overflow-y:auto;padding:48px}

.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px}
.page-head h1{font-size:26px;font-weight:700;letter-spacing:-.02em}
.page-head p{color:var(--text-muted);font-size:13.5px;margin-top:4px;max-width:560px;line-height:1.5}
.head-actions{display:flex;gap:10px}
.btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;padding:8px 14px;border-radius:6px;border:1px solid #e4e4e7;background:#fff;color:var(--text)}
.btn:hover{background:#fafafb}
.btn svg{width:15px;height:15px}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent-hover)}
.btn.danger{color:#e0372e;border-color:#e0372e33;background:#fff}
.btn.danger:hover{background:#fdf3f2}

.filters{display:flex;gap:10px;margin-bottom:26px}
.search{flex:0 0 320px;position:relative}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text-faint)}
.search input{width:100%;padding:9px 12px 9px 34px;border:1px solid #e4e4e7;border-radius:8px;font-size:14px;font-weight:500;background:#fff;color:var(--text)}
.search input::placeholder{color:#b2b7c2}
.search input:focus{outline:none;border-color:#285c59;box-shadow:0 0 0 2px rgba(28,74,71,0.12)}
.select{display:inline-flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid #e4e4e7;border-radius:8px;font-size:14px;font-weight:500;color:#667085;background:#fff}
.select:hover{background:#f4f5f5}
.select.active{border-color:var(--text);color:#fff;background:var(--text)}
.dd{position:relative;display:inline-block}
.dd-menu{position:absolute;top:calc(100% + 5px);left:0;background:#fff;border:1px solid var(--border-strong);border-radius:9px;box-shadow:0 8px 24px rgba(20,40,32,.13);padding:5px;min-width:180px;z-index:30;display:none}
.dd.open .dd-menu{display:block}
.dd-item{display:block;width:100%;text-align:left;padding:8px 10px;border-radius:7px;font-size:13px;color:var(--text)}
.dd-item:hover{background:#f4f5f5}
.dd-item.sel{color:var(--accent);font-weight:600}

.section-title{display:flex;align-items:center;gap:10px;margin:6px 0 14px}
.section-title h2{font-size:15px;font-weight:600}
.section-title .count{font-size:12px;color:var(--text-muted);background:#eef1f0;border-radius:20px;padding:2px 9px;font-weight:600}
.section-title .desc{color:var(--text-muted);font-size:12.5px;margin-left:2px}
.section + .section{margin-top:34px}
.tab-count{font-size:11px;font-weight:600;color:var(--text-muted);background:#eef1f0;border-radius:20px;padding:1px 7px;margin-left:3px}
.tab.active .tab-count{background:#fbe9df;color:var(--accent)}
.section-note{font-size:12.5px;color:var(--text-muted)}
.tab-note-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;min-height:22px}
.subtabs{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 20px}
.subtab{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text-muted);border:1px solid transparent}
.subtab:hover{background:#f1f2f2}
.subtab.active{background:#fff;border-color:var(--border-strong);color:var(--text)}
.subcount{font-size:11px;color:var(--text-faint);font-weight:600}
.subtab.active .subcount{color:var(--text-muted)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(236px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;transition:.12s;position:relative}
.card.click{cursor:pointer}
.card.click:hover{border-color:var(--border-strong);box-shadow:0 4px 14px rgba(20,40,32,.06);transform:translateY(-1px)}
.card .badge-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.card h3{font-size:15px;font-weight:600;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.card .cflag{font-size:18px;line-height:1}
.card .zone{color:var(--text-muted);font-size:13px;margin-top:5px}
.card .ver-row{text-align:right;margin-top:20px}
.card .ver{font-size:12px;color:var(--text-faint)}
.cont-grp{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-faint);margin:0 0 12px 2px}
.cont-grp:not(:first-of-type){margin-top:2px}

.badge{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;line-height:1.5;padding:2px 8px;border-radius:40px;border:1px solid transparent}
.badge svg{width:12px;height:12px}
.badge.ok{background:var(--ok-bg);border-color:rgba(18,183,106,0.2);color:#24292f}
.badge.ok svg{color:var(--ok-tx)}
.badge .bdot{width:6px;height:6px;border-radius:50%;flex:none}
.badge.managed{background:#f5f5f8;color:var(--text);border-color:#e4e4e7}
.badge.managed .bdot{background:#667085}
.badge.workspace{background:rgba(5,119,255,0.06);color:var(--text);border-color:rgba(5,119,255,0.25)}
.badge.workspace .bdot{background:#0577ff}
.badge.personal{background:rgba(151,71,255,0.06);color:var(--text);border-color:rgba(151,71,255,0.25)}
.badge.personal .bdot{background:#9747ff}
.badge.shared{background:rgba(28,74,71,0.06);color:var(--text);border-color:rgba(28,74,71,0.25)}
.badge.shared .bdot{background:#1c4a47}
.badge.off{background:#fdf3f2;color:var(--text);border-color:rgba(224,55,46,0.2)}
.badge.off svg{color:#e0372e}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ok-tx)}

/* ---------- DETAIL ---------- */
.detail-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.detail-head .title{display:flex;align-items:center;gap:12px}
.detail-head h1{font-size:23px;font-weight:700}
.detail-actions{display:flex;gap:9px}
.tabs{display:flex;gap:22px;border-bottom:1px solid var(--border);margin:18px 0 24px}
.tab{padding:10px 0;font-size:13.5px;font-weight:500;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-color:var(--accent);font-weight:600}
.panel{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
.block{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.block h4{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:18px 20px}
.kv .k{font-size:11.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:4px}
.kv .v{font-size:13.5px;color:var(--text);word-break:break-word}
.kv .v.mono{font-family:var(--mono);font-size:12px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.kpi .l{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.kpi .val{font-size:22px;font-weight:700;margin-top:7px;letter-spacing:-.02em}
.kpi .sub{font-size:11.5px;color:var(--text-muted);margin-top:3px}
.kpi .sub.up{color:var(--ok-tx)}
.robot-photo{width:132px;height:96px;border-radius:8px;background:#f2f4f3;display:flex;align-items:center;justify-content:center;color:var(--text-faint);flex:none}
.robot-photo svg{width:52px;height:52px}
.ug-top{display:flex;justify-content:space-between;font-size:13.5px;font-weight:600}
.ug-bar{height:8px;border-radius:20px;background:#eef1f0;overflow:hidden;margin-top:8px}
.ug-fill{height:100%;background:var(--ok-tx);border-radius:20px}
.hint{display:flex;gap:10px;align-items:flex-start;background:#f6f7f7;border-radius:8px;padding:12px 14px;font-size:13px;color:var(--text-muted);margin-top:16px;line-height:1.5}
.heat{width:100%;border-collapse:separate;border-spacing:3px;margin-top:10px;font-size:12px}
.heat th{padding:4px;color:var(--text-faint);font-weight:600;text-align:center}
.heat td{padding:9px 6px;text-align:center;color:var(--text-muted);background:#f1f3f4;border-radius:6px}
.heat td.h{background:none;color:var(--text-faint);text-align:left;font-weight:600}
.heat td.hot{background:var(--ok-tx);color:#fff;font-weight:700}
.set-wrap{display:grid;grid-template-columns:220px 1fr;gap:20px;align-items:start}
.set-nav{background:#fff;border:1px solid var(--border);border-radius:12px;padding:8px}
.set-nav button{display:flex;align-items:center;width:100%;text-align:left;padding:10px 12px;border-radius:8px;font-size:13.5px;color:var(--text-muted)}
.set-nav button.active{background:#fafafb;color:var(--text);font-weight:600;box-shadow:inset 3px 0 0 var(--accent)}
.set-nav button:hover{background:#fafafb}
.field-lg label{font-size:12px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:6px}
.field-lg input{width:100%;padding:10px 12px;border:1px solid #e4e4e7;border-radius:8px;font-size:14px;color:var(--text)}
.toggle-row{display:flex;align-items:center;gap:12px;font-size:14px;margin-bottom:16px}
.mon-group{padding:12px 16px;font-size:12.5px;font-weight:600;color:var(--text-muted);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.mon-row{display:flex;align-items:center;gap:12px;padding:14px 16px;font-size:13.5px}
.mon-dot{width:22px;height:22px;border-radius:50%;background:var(--ok-tx);flex:none;display:flex;align-items:center;justify-content:center}
.mon-dot:after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.usedrow{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:9px 0;border-bottom:1px solid var(--border)}
.usedrow:last-child{border-bottom:none}
.usedrow strong{font-weight:600}
.badge.fail{background:#fdecea;color:#d1493a}
.side-block h4{font-size:14px}
.side-block p{font-size:12.5px;color:var(--text-muted);line-height:1.55;margin-bottom:14px}
table{width:100%;border-collapse:collapse;margin-top:6px}
th{text-align:left;font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.05em;font-weight:600;padding:0 10px 10px}
td{padding:12px 10px;border-top:1px solid var(--border);font-size:13px}
.dev-name{font-weight:600}.dev-sub{font-size:11.5px;color:var(--text-faint)}
.hidden{display:none}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(20,35,28,.42);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.overlay.hidden{display:none}
.modal{background:#fff;border-radius:14px;width:560px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.25)}
.modal-head{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:18px;font-weight:700}
.mh-title{display:flex;align-items:center;gap:10px}
.mh-back{color:var(--text-muted);display:flex;padding:0}
.mh-back:hover{color:var(--text)}
.mh-back svg{width:18px;height:18px}
.mh-close{color:var(--text-muted);width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1}
.mh-close:hover{background:#f2f4f3;color:var(--text)}
.modal-intro{font-size:13px;color:var(--text-muted);line-height:1.5}
.modal-body{padding:18px 22px;display:flex;flex-direction:column;gap:12px}
.opt{border:1px solid var(--border-strong);border-radius:10px;padding:15px;display:flex;gap:13px;align-items:flex-start;cursor:pointer;transition:.12s}
.opt:hover{border-color:var(--accent);background:#fffaf7}
.opt .ic{width:38px;height:38px;border-radius:9px;background:#f2f4f3;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text)}
.opt .ic svg{width:19px;height:19px}
.opt h5{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.opt p{font-size:12.5px;color:var(--text-muted);margin-top:3px;line-height:1.5}
.modal-foot{padding:14px 22px;display:flex;justify-content:flex-end;gap:10px;border-top:1px solid var(--border)}
.tag-soon{font-size:10px;font-weight:700;background:#eef1f0;color:var(--text-muted);padding:2px 7px;border-radius:20px;letter-spacing:.03em}
.empty{padding:60px 20px;text-align:center;color:var(--text-muted);font-size:14px}
.empty-state{text-align:center;padding:72px 20px;border:1px dashed var(--border-strong);border-radius:12px}
.empty-state .es-icon{color:var(--text-faint);margin-bottom:16px}
.empty-state .es-icon svg{width:46px;height:46px}
.empty-state h3{font-size:16px;font-weight:700;color:var(--text)}
.empty-state p{font-size:13.5px;color:var(--text-muted);margin-top:6px;max-width:360px;margin-left:auto;margin-right:auto;line-height:1.5}
.badge.default{background:rgba(237,120,70,0.06);color:var(--text);border-color:rgba(237,120,70,0.25)}
.badge.default .bdot{background:#ed7846}
.link-btn{display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-size:13px;font-weight:600;margin-left:auto}
.link-btn:hover{color:var(--accent-hover)}
.link-btn svg{width:14px;height:14px}
.section-title{justify-content:flex-start}
.switch{position:relative;width:38px;height:22px;flex-shrink:0;display:inline-block}
.switch input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer;z-index:2}
.switch .track{position:absolute;inset:0;background:#d5dad8;border-radius:20px;transition:.15s}
.switch .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
.switch input:checked ~ .track{background:var(--accent)}
.switch input:checked ~ .knob{transform:translateX(16px)}
.grp{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-faint);margin:18px 0 2px;padding:0 4px}
.grp:first-child{margin-top:2px}
.region{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--border)}
.region:last-child{border-bottom:none}
.region .flag{font-size:19px;width:24px;text-align:center}
.region .info{flex:1}
.region .info .n{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:8px}
.region .info .c{font-size:12px;color:var(--text-muted);margin-top:1px}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--text-muted);font-size:13px;font-weight:500;margin-bottom:8px}
.back-btn:hover{color:var(--text)}.back-btn svg{width:15px;height:15px}
.modal-scroll{max-height:50vh;overflow-y:auto;padding:0 22px}
.modal-scroll .search{flex:1;margin-bottom:4px}
.foot-count{margin-right:auto;font-size:13px;color:var(--text-muted);font-weight:500;align-self:center}
.btn:disabled{opacity:.45;cursor:not-allowed}
.stepper{display:flex;align-items:center;gap:8px;padding:16px 22px 4px}
.step{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-faint);font-weight:600;white-space:nowrap}
.step .num{width:20px;height:20px;border-radius:50%;background:#eef1f0;color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:11px}
.step.active{color:var(--text)} .step.active .num{background:var(--accent);color:#fff}
.step.done .num{background:var(--ok-bg);color:var(--ok-tx)}
.step-line{flex:1;height:1px;background:var(--border)}
.hw-types{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:4px}
.opt-tile{border:1px solid var(--border-strong);border-radius:10px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:.12s}
.opt-tile:hover{background:#fafafb}
.opt-tile.sel{border-color:var(--accent);background:#fffaf7}
.opt-tile svg{width:22px;height:22px}
.os-row{display:flex;gap:10px;margin:4px 0}
.os-btn{flex:1;border:1px solid var(--border-strong);border-radius:10px;padding:16px 10px;text-align:center;font-size:13px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:9px;color:var(--text)}
.os-btn:hover{background:#f7f8f8}
.os-btn.sel{border-color:var(--accent);background:#fffaf7}
.os-btn svg{width:22px;height:22px}
.codebox{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border-strong);border-radius:10px;padding:12px 14px;font-family:var(--mono);font-size:16px;letter-spacing:.08em;background:#f7f8f8;margin:6px 0}
.codebox button{color:var(--accent);font-size:12px;font-weight:600;letter-spacing:0;font-family:'Geist','Inter',sans-serif}
.wait{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-muted);margin-top:12px}
.spin{width:16px;height:16px;border:2px solid var(--border-strong);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.connected{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ok-tx);font-weight:600;margin-top:12px;background:var(--ok-bg);padding:11px 13px;border-radius:8px}
.connected svg{width:16px;height:16px}
.radio-opt{display:flex;gap:11px;align-items:flex-start;border:1px solid var(--border-strong);border-radius:10px;padding:12px 14px;cursor:pointer;margin-bottom:8px}
.radio-opt.sel{border-color:var(--accent);background:#fffaf7}
.radio-opt .rd{width:18px;height:18px;border-radius:50%;border:2px solid var(--border-strong);flex-shrink:0;margin-top:1px;position:relative}
.radio-opt.sel .rd{border-color:var(--accent)}
.radio-opt.sel .rd:after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--accent)}
.radio-opt h5{font-size:13.5px;font-weight:600}
.radio-opt p{font-size:12px;color:var(--text-muted);margin-top:2px}
.field{margin-bottom:14px}
.field label{font-size:12px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:6px}
.field input{width:100%;padding:9px 12px;border:1px solid var(--border-strong);border-radius:9px;font-size:13.5px;color:var(--text)}
.field input:focus{outline:none;border-color:var(--accent)}
.field input:disabled{background:#f4f5f5;color:var(--text-muted)}

.caps-row{display:flex;gap:8px}
.chip{border:1px solid var(--border-strong);border-radius:20px;padding:6px 13px;font-size:12.5px;font-weight:600;color:var(--text-muted)}
.chip.sel{border-color:var(--accent);background:#fffaf7;color:var(--accent)}
.proto-ring{position:fixed;inset:0;pointer-events:none;box-shadow:inset 0 0 0 4px rgba(28,74,71,0.12);z-index:2147483646}
.proto-crumb{position:fixed;top:12px;left:12px;z-index:2147483647;display:flex;align-items:center;gap:8px;padding:5px 10px;font-size:11px;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:#475467;background:rgba(255,255,255,0.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid #ececf0;border-radius:8px;box-shadow:0 2px 8px rgba(16,24,40,0.10);text-decoration:none}

const content = document.getElementById('content');
const crumb = document.getElementById('crumb');
let currentView = 'locations';
let currentTab = 'public';
let hwCat = 'all';
let filterState = {status:'all',runner:'all',scope:'all',zone:'all'};
function resetFilters(){filterState={status:'all',runner:'all',scope:'all',zone:'all'};}
function render(){ if(currentView==='hardware') renderHardware(); else renderList(); }
function setView(v){currentView=v;currentTab='public';hwCat='all';resetFilters();render();}
function setTab(t){currentTab=t;resetFilters();renderList();}
function setHwCat(c){hwCat=c;renderHardware();}
const HW_CAT = [['cellular','Cellular'],['smartphone','Smartphone'],['web','Web'],['passive','Passive']];
const catLabel = c => (HW_CAT.find(x=>x[0]===c)||[,c])[1];
const hasHardware = () => LOCATIONS.some(l=>l.kind==='private'&&l.runner==='appliance');

function zoneOptions(){
  const list = currentTab==='public' ? LOCATIONS.filter(l=>l.kind==='public'&&l.enabled) : LOCATIONS.filter(l=>l.kind==='private'&&l.runner==='desktop');
  const keys = [...new Set(list.map(l=>l.kind==='public'?l.cont:l.zone.split('/')[0]))];
  return [['all','All zones'],...keys.map(k=>[k,k])];
}
function dropdown(key,label,options){
  const cur=filterState[key];
  const curText = cur==='all'?label:(options.find(o=>o[0]===cur)||[,label])[1];
  return `<div class="dd"><button class="select ${cur!=='all'?'active':''}" data-label="${label}" onclick="toggleDD(this)"><span class="dd-label">${curText}</span> <svg viewBox="0 0 24 24" width="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
    <div class="dd-menu">${options.map(o=>`<button class="dd-item ${cur===o[0]?'sel':''}" onclick="setFilter('${key}','${o[0]}',this)">${o[1]}</button>`).join('')}</div></div>`;
}
function toggleDD(btn){
  const dd=btn.closest('.dd'); const open=dd.classList.contains('open');
  document.querySelectorAll('.dd.open').forEach(d=>d.classList.remove('open'));
  if(!open) dd.classList.add('open');
}
function setFilter(key,val,el){
  filterState[key]=val;
  const menu=el.closest('.dd-menu'); menu.querySelectorAll('.dd-item').forEach(i=>i.classList.remove('sel')); el.classList.add('sel');
  const dd=el.closest('.dd'); const trg=dd.querySelector('.select');
  dd.querySelector('.dd-label').textContent = (val==='all'? trg.dataset.label : el.textContent);
  trg.classList.toggle('active', val!=='all');
  dd.classList.remove('open');
  applyFilters();
}
function applyFilters(){
  const q=(document.getElementById('locSearch')?.value||'').trim().toLowerCase();
  document.querySelectorAll('#content .card').forEach(c=>{
    const okQ=!q||(c.dataset.search||'').includes(q);
    const okS=filterState.status==='all'||c.dataset.status===filterState.status;
    const okR=filterState.runner==='all'||c.dataset.runner===filterState.runner;
    const okSc=filterState.scope==='all'||c.dataset.scope===filterState.scope;
    const okZ=filterState.zone==='all'||c.dataset.zone===filterState.zone;
    c.style.display=(okQ&&okS&&okR&&okSc&&okZ)?'':'none';
  });
  document.querySelectorAll('#content .grid').forEach(g=>{
    const vis=[...g.querySelectorAll('.card')].some(c=>c.style.display!=='none');
    g.style.display=vis?'':'none';
    const prev=g.previousElementSibling;
    if(prev&&prev.classList.contains('cont-grp')) prev.style.display=vis?'':'none';
  });
}
document.addEventListener('click',e=>{ if(!e.target.closest('.dd')) document.querySelectorAll('.dd.open').forEach(d=>d.classList.remove('open')); });

function scopeBadge(loc){
  if(loc.kind==='public') return '<span class="badge managed"><span class="bdot"></span>Managed</span>';
  if(loc.scope==='workspace') return '<span class="badge workspace"><span class="bdot"></span>Workspace</span>';
  if(loc.scope==='shared') return '<span class="badge shared"><span class="bdot"></span>Shared</span>';
  return '<span class="badge personal"><span class="bdot"></span>Personal</span>';
}
function statusBadge(loc){
  if(loc && loc.status==='offline') return '<span class="badge off"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg>Offline</span>';
  return '<span class="badge ok"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M8.5 12l2.4 2.4 4.6-5.2"/></svg>Online</span>';
}

function cardHTML(loc){
  const zk = loc.kind==='public' ? loc.cont : loc.zone.split('/')[0];
  const search = (loc.kind==='public' ? `${loc.city} ${loc.region} ${loc.cont}` : `${loc.name} ${loc.zone} ${loc.caps||''}`).toLowerCase();
  const data = `data-status="${loc.status}" data-runner="${loc.runner}" data-scope="${loc.scope}" data-zone="${zk}" data-search="${search}"`;
  if(loc.kind==='public'){
    return `<div class="card click" ${data} onclick="showDetail('${loc.id}')">
      <div class="badge-row">${statusBadge(loc)} ${loc.default?'<span class="badge default"><span class="bdot"></span>Default</span>':''}</div>
      <h3><span class="cflag">${loc.flag}</span>${loc.city}</h3>
      <div class="zone">${loc.region} · ${loc.caps||'Web · API'}</div>
      <div class="ver-row"><span class="ver">${loc.version}</span></div>
    </div>`;
  }
  return `<div class="card click" ${data} onclick="showDetail('${loc.id}')">
    <div class="badge-row">${statusBadge(loc)} ${scopeBadge(loc)}</div>
    <h3>${loc.name}</h3>
    <div class="zone">${loc.zone}</div>
    <div class="ver-row"><span class="ver">${loc.version}</span></div>
  </div>`;
}

function publicGroups(pub){
  const conts=['Europe','Americas','Asia-Pacific','Africa'];
  return conts.map(c=>{
    const items=pub.filter(l=>l.cont===c);
    if(!items.length) return '';
    return `<div class="cont-grp">${c}</div><div class="grid" style="margin-bottom:16px">${items.map(cardHTML).join('')}</div>`;
  }).join('');
}

function emptyState(title, sub, cta){
  return `<div class="empty-state"><div class="es-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="6" rx="1.5"/><rect x="3" y="13" width="18" height="6" rx="1.5"/><path d="M7 8h.01M7 16h.01M17 8h1.5M17 16h1.5"/></svg></div><h3>${title}</h3>${sub?`<p>${sub}</p>`:''}${cta||''}</div>`;
}
function hwSubtabs(){
  const all = LOCATIONS.filter(l=>l.kind==='private'&&l.runner==='appliance');
  const tabs = [['all','All',all.length], ...HW_CAT.map(c=>[c[0],c[1],all.filter(l=>l.cat===c[0]).length])];
  return `<div class="tabs" style="margin:4px 0 20px">${tabs.map(t=>`<button class="tab ${hwCat===t[0]?'active':''}" onclick="setHwCat('${t[0]}')">${t[1]} <span class="tab-count">${t[2]}</span></button>`).join('')}</div>`;
}
function hwGroups(){
  const list = LOCATIONS.filter(l=>l.kind==='private'&&l.runner==='appliance');
  const cats = hwCat==='all' ? HW_CAT.map(c=>c[0]) : [hwCat];
  return cats.map(c=>{
    const items=list.filter(l=>l.cat===c);
    if(!items.length) return hwCat==='all' ? '' : emptyState(`No ${catLabel(c)} robot yet.`,'Contact our sales team to order a new one.');
    return `${hwCat==='all'?`<div class="cont-grp">${catLabel(c)}</div>`:''}<div class="grid" style="margin-bottom:16px">${items.map(cardHTML).join('')}</div>`;
  }).join('');
}
function hwZoneOptions(){
  const list=LOCATIONS.filter(l=>l.kind==='private'&&l.runner==='appliance');
  const keys=[...new Set(list.map(l=>l.zone.split('/')[0]))];
  return [['all','All zones'],...keys.map(k=>[k,k])];

  const pub = LOCATIONS.filter(l=>l.kind==='public' && l.enabled);

  content.innerHTML = `

        <button class="btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6M10 14L21 3"/></svg>Help</button>

    <div class="tabs" style="margin:4px 0 20px">

    </div>

    <div class="filters">
      <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input id="locSearch" placeholder="Search locations..." oninput="applyFilters()" /></div>
      ${dropdown('status','Status',[['all','All statuses'],['online','Online']])}
      ${currentTab==='private'?dropdown('scope','Scope',[['all','All scopes'],['workspace','Shared'],['personal','Personal']]):''}
      ${dropdown('zone','Zone',zoneOptions())}
      ${currentTab==='public'?`<button class="btn" style="margin-left:auto" onclick="openModal('public')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="21" y1="4" x2="14" y2="4"/><line x1="10" y1="4" x2="3" y2="4"/><line x1="21" y1="12" x2="12" y2="12"/><line x1="8" y1="12" x2="3" y2="12"/><line x1="21" y1="20" x2="16" y2="20"/><line x1="12" y1="20" x2="3" y2="20"/><line x1="14" y1="2" x2="14" y2="6"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="16" y1="18" x2="16" y2="22"/></svg>Manage regions</button>`:''}
    </div>

      <div class="done-icon">${CHECK}</div>
      <h3 style="font-size:17px">Desktop runner connected</h3>
      <p style="font-size:13px;color:var(--text-muted);margin-top:6px;max-width:380px;margin-left:auto;margin-right:auto">${dsDraft.name} is now a private location (${dsDraft.scope==='personal'?'Personal':'Workspace'}). You can select it when running a test.</p>
    </div>`;
    foot=`<button class="btn" onclick="closeModal();setTab('private')">Done</button><button class="btn primary" onclick="closeModal();showDetail(dsNewId)">View location</button>`;
  }
  const head = dsStep==='done'
    ? `<div class="modal-head" style="border:none;justify-content:flex-end;padding-bottom:0"><button class="mh-close" onclick="closeModal()">&times;</button></div>`
    : modalHeader('Connect a desktop runner','modalOptions()');
  modalContent.innerHTML = head + (dsStep==='done'?'':dsStepper()) + body + `<div class="modal-foot">${foot}</div>`;
}

function finishDesktop(){
  dsNewId='dr-'+Date.now();
  LOCATIONS.push({id:dsNewId,name:dsDraft.name,kind:'private',cat:'desktop',runner:'desktop',scope:dsDraft.scope,zone:dsDraft.zone,status:'online',version:'v7.30.0',owner:dsDraft.scope==='personal'?'julien.kapptivate':'',host:dsDraft.host,uuid:(crypto.randomUUID?crypto.randomUUID():'a1b2c3d4-gen'),caps:dsDraft.caps.join(' · '),devices:[]});
  dsStep='done';
  modalDesktop();
}

/* ---- Connect hardware wizard ---- */
let hwStep=1, hwNewId=null;
const hwDraft={type:'cellular',connected:false,name:'',zone:'Guinee/Conakry'};
const HW_TYPES=[['cellular','SIM'],['smartphone','Smartphone'],['web','Web'],['passive','Passive']];
const TYPEICON={
  cellular:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M9 6h6M9 10h6"/></svg>',
  smartphone:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/></svg>',
  web:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg>',
  passive:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>'
};
function openHardware(){hwStep=1;hwDraft.connected=false;hwDraft.type='cellular';hwDraft.name='';modalHardware();}
function hwStepper(){
  const steps=['Type','Pair','Configure']; const cur=hwStep==='done'?4:hwStep;
  return `<div class="stepper">${steps.map((s,i)=>{const n=i+1,cls=cur>n?'done':(cur===n?'active':'');return `<div class="step ${cls}"><span class="num">${cur>n?'✓':n}</span>${s}</div>${i<2?'<span class="step-line"></span>':''}`;}).join('')}</div>`;
}
function modalHardware(){
  modalEl.classList.remove('hidden');
  let body='',foot='';
  if(hwStep===1){
    body=`<div class="modal-body">
      <p class="modal-intro">What kind of robot are you connecting? This sets its capability.</p>
      <div class="hw-types">${HW_TYPES.map(t=>`<div class="opt-tile ${hwDraft.type===t[0]?'sel':''}" onclick="hwDraft.type='${t[0]}';modalHardware()">${TYPEICON[t[0]]}<span>${t[1]}</span></div>`).join('')}</div>
    </div>`;
    foot=`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="hwStep=2;modalHardware()">Next</button>`;
  } else if(hwStep===2){
    if(!hwDraft.connected) setTimeout(()=>{if(hwStep===2&&!hwDraft.connected){hwDraft.connected=true;modalHardware();}},1700);
    body=`<div class="modal-body">
      <p class="modal-intro">Power on the robot, connect it to the network, and enter this enrollment code in its setup screen:</p>
      <div class="codebox">KAP-7C1D-2E9F <button onclick="this.textContent='Copied ✓'">Copy</button></div>
      ${hwDraft.connected?`<div class="connected">${CHECK} Robot detected on the network</div>`:`<div class="wait"><span class="spin"></span>Waiting for the robot to connect...</div>`}
    </div>`;
    foot=`<button class="btn" onclick="hwStep=1;modalHardware()">Back</button><button class="btn primary" ${hwDraft.connected?'':'disabled'} onclick="hwStep=3;modalHardware()">Next</button>`;
  } else if(hwStep===3){
    body=`<div class="modal-body">
      <div class="field"><label>Name</label><input value="${hwDraft.name}" placeholder="e.g. ogn-4g-05" oninput="hwDraft.name=this.value"></div>
      <div class="field"><label>Capability</label><input value="${catLabel(hwDraft.type)}" disabled></div>
      <div class="field"><label>Zone</label><input value="${hwDraft.zone}" oninput="hwDraft.zone=this.value"></div>
    </div>`;
    foot=`<button class="btn" onclick="hwStep=2;modalHardware()">Back</button><button class="btn primary" onclick="finishHardware()">Connect</button>`;
  } else {
    body=`<div class="modal-body" style="text-align:center;padding-top:22px">
      <div class="done-icon">${CHECK}</div>
      <h3 style="font-size:17px">Robot connected</h3>
      <p style="font-size:13px;color:var(--text-muted);margin-top:6px;max-width:380px;margin-left:auto;margin-right:auto">${hwDraft.name||'New robot'} is now available under ${catLabel(hwDraft.type)}.</p>
    </div>`;
    foot=`<button class="btn" onclick="closeModal();setView('hardware')">Done</button><button class="btn primary" onclick="closeModal();showDetail(hwNewId)">View</button>`;
  }
  const head = hwStep==='done'
    ? `<div class="modal-head" style="border:none;justify-content:flex-end;padding-bottom:0"><button class="mh-close" onclick="closeModal()">&times;</button></div>`
    : `<div class="modal-head"><div class="mh-title"><h3>Connect a robot</h3></div><button class="mh-close" onclick="closeModal()">&times;</button></div>`;
  modalContent.innerHTML = head + (hwStep==='done'?'':hwStepper()) + body + `<div class="modal-foot">${foot}</div>`;
}
function finishHardware(){
  hwNewId='hw-'+Date.now();
  LOCATIONS.push({id:hwNewId,name:hwDraft.name||('new-'+hwDraft.type),kind:'private',cat:hwDraft.type,runner:'appliance',scope:'workspace',zone:hwDraft.zone,status:'online',version:'v1.0.0',host:hwDraft.name||('new-'+hwDraft.type),uuid:(crypto.randomUUID?crypto.randomUUID():'hw-gen'),caps:catLabel(hwDraft.type),devices:[]});
  hwStep='done'; modalHardware();
}
modalEl.addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});

if(!hasHardware()){ ['nav-hardware','nav-devices'].forEach(id=>{const n=document.getElementById(id); if(n) n.style.display='none';}); }
render();
</script>
